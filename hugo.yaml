baseurl: https://sahgnyi.github.io/
languageCode: zh-cn
theme: hugo-theme-stack
title: Sy05
DefaultContentLanguage: zh-cn
hasCJKLanguage: true

permalinks:
    post: /p/:slug/
    page: /:slug/

params:
    mainSections:
        - post
    sidebar:
        avatar:
            enabled: false
    article:
        toc: false
        readingTime: false
        license:
            enabled: false
    comments:
        enabled: false
    widgets:
        homepage:
            - type: search
        page: []
    colorScheme:
        toggle: false
        default: light

markup:
    goldmark:
        renderer:
            unsafe: true
